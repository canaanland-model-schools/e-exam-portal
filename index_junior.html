<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="fav_icon2.ico">
    <title>Exam Dashboard | Canaanland CBT Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #008000;
            --secondary-color: #d90000;
            --background-color: rgb(50,125,50);
            --text-color: #333;
            --card-bg: white;
            --header-bg: rgb(50,125,50);
            --header-text: white;
            --nav-bg: #006400;
            --input-border: #ddd;
        }

        body {
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('img/wisdom_logo1.png') no-repeat center center;
            background-size: 300px 300px;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        header {
            background: linear-gradient(135deg, #008000, #006400);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-weight: bold;
            border: 2px solid gold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .logo img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
        }

        .logout-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            background-color: crimson;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background-color: #dc143c;
            transform: scale(1.05);
        }

        .welcome-message {
            background-color: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px);
        }

        .welcome-message img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: block;
            margin: 0 auto;
            border: 4px solid #008000;
            object-fit: cover;
        }

        .welcome-message h2 {
            color: #008000;
            margin-top: 15px;
        }

        .exam-sections {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .exam-section {
            background-color: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            flex: 1;
            overflow: hidden;
            min-width: 280px;
            backdrop-filter: blur(5px);
            transition: transform 0.3s;
        }

        .exam-section:hover {
            transform: translateY(-5px);
        }

        .section-header {
            background: linear-gradient(135deg, #008000, #006400);
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        .section-body {
            padding: 25px;
        }

        select, input[type="password"] {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: left;
            background-color: white;
            color: #333;
            transition: all 0.3s;
        }

        select:focus, input[type="password"]:focus {
            border-color: #008000;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,128,0,0.1);
        }

        .btn {
            background: linear-gradient(135deg, #008000, #006400);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(0,128,0,0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,128,0,0.4);
        }

        .btn:disabled {
            background: #aaa;
            cursor: not-allowed;
            transform: none;
        }

        .attempt-status {
            background-color: #fff3cd;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }

        .completed {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }

        .available {
            background-color: #d1ecf1;
            color: #0c5460;
        }

        .loading-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #008000;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .windows-activate {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            padding: 15px;
            background-color: rgba(0,0,0,0.3);
            border-radius: 12px;
        }

        @media (max-width: 900px) {
            .exam-sections {
                flex-direction: column;
            }
        }

        .info-badge {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>

        // Get logged-in student from sessionStorage
        const loggedInUser = JSON.parse(sessionStorage.getItem('loggedInUser'));
        const username = sessionStorage.getItem('username') || (loggedInUser ? loggedInUser.username : null);
        const studentImage = sessionStorage.getItem('image') || (loggedInUser ? `img/${loggedInUser.image}` : 'img/default_user.jpg');
        const studentClass = sessionStorage.getItem('studentClass') || (loggedInUser ? loggedInUser.class : 'Not Set');

        // Redirect if not logged in
        if (!username) {
            alert("⚠️ Please log in first.");
            window.location.href = "sign_in.html";
        }

        // Display user info
        document.getElementById('userName').innerText = username || 'Student';
        document.getElementById('userImage').src = studentImage;
        document.getElementById('classBadge').innerHTML = `<i class="fa-solid fa-users"></i> Class: ${studentClass || 'Not Assigned'}`;

        // ==================== FIREBASE EXAM ATTEMPT TRACKING ====================
        async function hasCompletedExamInFirebase(cls, sub, studentId) {
            try {
                const attemptDocId = `${cls}_${sub}`.toLowerCase();
                const attemptRef = doc(db, "students", studentId, "exam_attempts", attemptDocId);
                const attemptSnap = await getDoc(attemptRef);
                return attemptSnap.exists() && attemptSnap.data().completed === true;
            } catch (error) {
                console.warn("Firebase read error:", error);
                return false;
            }
        }

        async function markExamCompletedInFirebase(cls, sub, studentId, score = null) {
            try {
                const attemptDocId = `${cls}_${sub}`.toLowerCase();
                const attemptRef = doc(db, "students", studentId, "exam_attempts", attemptDocId);
                await setDoc(attemptRef, {
                    completed: true,
                    completedAt: new Date().toISOString(),
                    class: cls,
                    subject: sub,
                    score: score || 0
                });
                console.log("✅ Exam marked completed in Firebase");
                return true;
            } catch (error) {
                console.error("Firebase write error:", error);
                return false;
            }
        }

        async function updateAttemptStatus() {
            const cls = document.getElementById("classSelect").value.toLowerCase();
            const sub = document.getElementById("subjectSelect").value.toLowerCase();
            const statusElement = document.getElementById("attemptStatus");
            
            if (!cls || !sub) {
                statusElement.innerHTML = "📌 Please select both class and subject";
                statusElement.className = "attempt-status";
                return;
            }
            
            statusElement.innerHTML = "⏳ Checking exam attempt... <span class='loading-indicator'></span>";
            
            try {
                const completed = await hasCompletedExamInFirebase(cls, sub, username);
                if (completed) {
                    statusElement.innerHTML = "❌ You have already completed this exam. No further attempts allowed.";
                    statusElement.className = "attempt-status completed";
                } else {
                    statusElement.innerHTML = "✅ This exam is available for you to take (no previous attempt found).";
                    statusElement.className = "attempt-status available";
                }
            } catch (err) {
                statusElement.innerHTML = "⚠️ Unable to verify attempt. Please check your connection.";
                statusElement.className = "attempt-status";
            }
        }

        // ==================== START EXAM FUNCTION ====================
        window.startExam = async function() {
            const cls = document.getElementById("classSelect").value.toLowerCase();
            const sub = document.getElementById("subjectSelect").value.toLowerCase();
            const type = document.getElementById("typeSelect").value.toLowerCase();
            const enteredPass = document.getElementById("examPassword").value.trim();
            const startBtn = document.getElementById("startExamBtn");
            
            if (!cls || !sub || !enteredPass) {
                alert("⚠️ Please complete all selections and enter exam password.");
                return;
            }
            
            startBtn.disabled = true;
            startBtn.innerHTML = '<i class="fa-solid fa-spinner fa-pulse"></i> Verifying...';
            
            try {
                // Get correct password from local database (could also fetch from Firebase)
                const classPasswords = classSubjectPasswords[cls];
                if (!classPasswords) {
                    alert("❌ Invalid class selected!");
                    startBtn.disabled = false;
                    startBtn.innerHTML = '<i class="fa-solid fa-play"></i> Start Exam';
                    return;
                }
                
                const correctPassword = classPasswords[sub];
                if (!correctPassword) {
                    alert("❌ No password configured for this subject in the selected class!");
                    startBtn.disabled = false;
                    startBtn.innerHTML = '<i class="fa-solid fa-play"></i> Start Exam';
                    return;
                }
                
                if (enteredPass !== correctPassword) {
                    alert("❌ Incorrect password for this class and subject combination!");
                    startBtn.disabled = false;
                    startBtn.innerHTML = '<i class="fa-solid fa-play"></i> Start Exam';
                    return;
                }
                
                // Check Firebase attempt
                const alreadyAttempted = await hasCompletedExamInFirebase(cls, sub, username);
                if (alreadyAttempted) {
                    alert("⚠️ You have already completed this exam. No further attempts allowed.");
                    window.location.href = "exam_attempted.html";
                    return;
                }
                
                // Save exam details to sessionStorage
                sessionStorage.setItem("examClass", cls);
                sessionStorage.setItem("examSubject", sub);
                sessionStorage.setItem("examType", type);
                sessionStorage.setItem("examInfo", `${formatSubjectName(sub)} - ${cls.toUpperCase()} (3RD TERM)`);
                sessionStorage.setItem("examStarted", "true");
                
                // Store Firebase mark function reference for exam page
                window.markExamComplete = async (score) => {
                    return await markExamCompletedInFirebase(cls, sub, username, score);
                };
                
                const redirectUrl = `${cls}_${sub}_exam.html`;
                
                // Check if exam file exists
                fetch(redirectUrl, { method: "HEAD" })
                    .then(response => {
                        if (response.ok) {
                            alert(`✅ Access granted! Starting ${formatSubjectName(sub)} exam...`);
                            window.location.href = redirectUrl;
                        } else {
                            alert("⚠️ Exam page not available yet. Contact administrator.");
                            window.location.href = "landing.html";
                        }
                    })
                    .catch(() => {
                        alert("⚠️ Cannot load exam page. Contact support.");
                        window.location.href = "landing.html";
                    })
                    .finally(() => {
                        startBtn.disabled = false;
                    });
                    
            } catch (error) {
                console.error("Start exam error:", error);
                alert("❌ Network or database error. Please try again.");
                startBtn.disabled = false;
                startBtn.innerHTML = '<i class="fa-solid fa-play"></i> Start Exam';
            }
        };

        function formatSubjectName(subject) {
            const subjectMap = {
                'demo': 'Demo Exam',
                'mathematics': 'Mathematics',
                'english_language': 'English Language',
                'english_literature': 'Literature in English',
                'intermediate_science': 'Intermediate Science',
                'digital_technology': 'Computer Studies',
                'home_economics': 'Home Economics',
                'agricultural_science': 'Agricultural Science',
                'livestock_farming': 'Livestock Farming',
                'social_studies': 'Social Studies',
                'business_studies': 'Business Studies',
                'cultural_and_creative_art': 'Cultural & Creative Art',
                'yoruba': 'Yoruba',
                'phe': 'Physical Health Education',
                'crs': 'Christian Religious Studies',
                'french': 'French',
                'music': 'Music',
                'phonetics': 'Phonetics',
                'fine_art': "Fine Art",
                'nigerian_history': 'History',
                'ekiti_values': 'Ekiti Values',
                'fashion_design_and_garment_making': 'Fashion Design'
            };
            return subjectMap[subject] || subject.charAt(0).toUpperCase() + subject.slice(1).replace(/_/g, ' ');
        }

        function logout() {
            sessionStorage.clear();
            localStorage.removeItem('loggedInStudent');
            window.location.href = 'sign_in.html';
        }

        // Attach event listeners
        document.getElementById("classSelect").addEventListener("change", updateAttemptStatus);
        document.getElementById("subjectSelect").addEventListener("change", updateAttemptStatus);
        
        // Initial status check if selections exist
        window.addEventListener("DOMContentLoaded", () => {
            const cls = document.getElementById("classSelect").value;
            const sub = document.getElementById("subjectSelect").value;
            if (cls && sub) updateAttemptStatus();
        });
        
        console.log("✅ Dashboard ready | Student:", username);
    </script>
